# This config map gives the "octopus" user the permissions required by the Argo CD Instance
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  policy.csv: |
    p, octopus, applications, get, */*, allow
    p, octopus, clusters, get, *, allow
    p, octopus, logs, get, */*, allow
    p, octopus, applications, sync, */*, allow